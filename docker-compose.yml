services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transcendence-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=https://localhost/api
    depends_on:
      - backend
    networks:
      - transcendence-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transcendence-backend
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./database:/app/database
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_PATH=/app/database/transcendence.db
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=transcendence-dev-token
      - VAULT_ENABLED=${VAULT_ENABLED:-false}
    depends_on:
      vault:
        condition: service_started
    networks:
      - transcendence-network

  nginx:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: transcendence-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./modsecurity/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./modsecurity/modsecurity.conf:/etc/modsecurity.d/modsecurity.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    environment:
      - MODSEC_RULE_ENGINE=On
      - PARANOIA=1
      - ANOMALY_INBOUND=5
      - ANOMALY_OUTBOUND=4
    depends_on:
      - frontend
      - backend
    networks:
      - transcendence-network

  vault:
    image: hashicorp/vault:1.15
    container_name: transcendence-vault
    ports:
      - "8200:8200"
    volumes:
      - ./vault/config:/vault/config:ro
      - vault-data:/vault/data
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=transcendence-dev-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: server -dev
    networks:
      - transcendence-network

volumes:
  vault-data:

networks:
  transcendence-network:
    driver: bridge
