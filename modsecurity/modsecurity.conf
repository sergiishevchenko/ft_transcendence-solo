SecRuleEngine On

SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

SecResponseBodyAccess Off

SecTmpDir /tmp/
SecDataDir /tmp/

SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/modsec_audit.log

SecArgumentSeparator &
SecCookieFormat 0

SecRule REQUEST_HEADERS:Content-Type "^(?:application(?:/soap\+|/)|text/)xml" \
  "id:'200000',phase:1,t:none,t:lowercase,pass,nolog,ctl:requestBodyProcessor=XML"

SecRule REQUEST_HEADERS:Content-Type "^application/json" \
  "id:'200001',phase:1,t:none,t:lowercase,pass,nolog,ctl:requestBodyProcessor=JSON"

SecRule ARGS "@detectXSS" \
  "id:'200002',phase:2,deny,status:403,log,msg:'XSS Attack Detected',tag:'attack-xss'"

SecRule ARGS "@detectSQLi" \
  "id:'200003',phase:2,deny,status:403,log,msg:'SQL Injection Detected',tag:'attack-sqli'"

SecRule REQUEST_URI "@rx (?i)\.(bak|backup|old|orig|save|swp|temp|tmp|~)$" \
  "id:'200004',phase:1,deny,status:403,log,msg:'Backup File Access Attempt'"

SecRule REQUEST_URI "@rx (?i)/\." \
  "id:'200005',phase:1,deny,status:403,log,msg:'Hidden File Access',chain"
  SecRule REQUEST_URI "!@rx (?i)/\.well-known/"

SecRule REQUEST_HEADERS:User-Agent "@rx ^$" \
  "id:'200006',phase:1,deny,status:403,log,msg:'Empty User-Agent'"

SecRule REQUEST_METHOD "!@within GET HEAD POST PUT DELETE OPTIONS PATCH" \
  "id:'200007',phase:1,deny,status:405,log,msg:'Method Not Allowed'"

SecRule &REQUEST_HEADERS:Host "@eq 0" \
  "id:'200008',phase:1,deny,status:400,log,msg:'Missing Host Header'"

SecRule REQUEST_URI "@rx \.\./" \
  "id:'200009',phase:1,deny,status:403,log,msg:'Path Traversal Attempt'"

SecAction \
  "id:'900000',phase:1,nolog,pass,t:none,\
   setvar:tx.crs_setup_version=400,\
   setvar:tx.paranoia_level=1,\
   setvar:tx.anomaly_score_threshold=5,\
   setvar:tx.inbound_anomaly_score_threshold=5,\
   setvar:tx.outbound_anomaly_score_threshold=4"

SecRule REQUEST_URI "@rx /api/" \
  "id:'200010',phase:1,pass,nolog,\
   setvar:tx.allowed_request_content_type=|application/json|multipart/form-data|application/x-www-form-urlencoded|"
